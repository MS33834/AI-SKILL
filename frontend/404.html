    <script>
      // Static host 404 → hash router fallback.
      //
      // Static hosts (GitHub Pages / GitCode Pages / etc.) return
      // 404.html for any path that doesn't match a real file. This is
      // exactly what happens when a user pastes a deep link like
      // /<repo>/skill/pdf-summarizer (no hash). The file doesn't
      // exist, so the server serves this page. This script detects
      // the URL, splits off the site base (the first path segment,
      // which is the project name), and re-routes the user to the
      // same path under the hash router so the SPA picks it up.
      //
      // We assume the site is hosted as a project page
      // (e.g. https://<user>.gitcode.host/AI-SKILL/). The first path
      // segment is therefore always the repo name, and we just need
      // to insert "#/" right after it. For a custom-domain deploy
      // where there's no repo prefix, edit the line marked "CUSTOM".
      (function () {
        try {
          var path = window.location.pathname;
          // Skip the root path — nothing to redirect.
          if (path === "/" || path === "") return;
          // Skip if the path looks like a real file (has an extension
          // and isn't itself the 404 page being served).
          if (/\.[a-zA-Z0-9]+$/.test(path)) return;
          // The first path segment is the static host repo prefix
          // (e.g. "AI-SKILL" on https://<user>.gitcode.host/AI-SKILL/).
          // The rest is the SPA route we want under the hash.
          // CUSTOM: if you deploy to a custom domain with no repo
          // prefix, change `base` to "" and `rest` to `path.slice(1)`.
          var segs = path.split("/").filter(Boolean);
          if (segs.length === 0) return;
          var base = "/" + segs[0] + "/";
          var rest = segs.slice(1).join("/");
          if (!rest) {
            // User hit the repo root with no SPA route. Send them
            // to the index, not to a 404 within the SPA.
            window.location.replace(base);
            return;
          }
          // Build the hash-routed URL. We use replace() so the
          // broken URL doesn't end up in browser history.
          var target = base + "#/" + rest + window.location.search;
          window.location.replace(target);
        } catch (e) {
          // If anything throws, fall through and let the SPA render
          // normally — the router will show the "unknown route" page.
        }
      })();
    </script>
