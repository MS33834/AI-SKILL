<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#161514" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      data-i18n="meta.description"
      content="An open-source index of 928+ AI agent skill repositories, led by an internal core team and open for community participation. Search by skill, domain, vendor type, or stars and jump straight to the source. MIT licensed."
    />
    <meta property="og:title" data-i18n="meta.ogTitle" content="AI-SKILL · open-source skill index" />
    <meta
      property="og:description"
      data-i18n="meta.ogDescription"
      content="Searchable index of 928+ AI agent skill repositories. MIT · no tracking · no signup."
    />
    <meta property="og:type" content="website" />
    <title data-i18n="meta.title">AI-SKILL · open-source skill index</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="preload" href="./skills.json" as="fetch" type="application/json" />
    <link rel="preload" href="./external-repos.json" as="fetch" type="application/json" />
    <script>
      // Register the service worker for offline support.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch((err) => {
            console.warn("Service Worker registration failed:", err);
          });
        });
      }
    </script>
    <!-- Preconnect to the two main external domains users navigate to from this site. -->
    <link rel="preconnect" href="https://github.com" />
    <link rel="dns-prefetch" href="https://github.com" />
    <link rel="preconnect" href="https://gitcode.com" />
    <link rel="dns-prefetch" href="https://gitcode.com" />
    <script type="module" crossorigin src="/src/main.ts"></script>
    <link rel="stylesheet" crossorigin href="/src/style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main" data-i18n="a11y.skip">Skip to content</a>
    <div id="route-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <header class="topbar">
      <a class="topbar__brand" href="#/">
        <svg
          class="brand-mark topbar__mark"
          width="16"
          height="16"
          viewBox="0 0 16 16"
          aria-hidden="true"
          focusable="false"
        >
          <rect width="16" height="16" rx="2" fill="currentColor" />
        </svg>
        <span>AI-SKILL</span>
      </a>
      <nav class="topbar__nav" role="navigation" aria-label="Main navigation">
        <a href="#/bundle" data-i18n="nav.bundle">Bundle</a>
        <a href="#/external" data-i18n="nav.external">Index</a>
        <button
          class="lang-toggle"
          id="lang-toggle"
          type="button"
          aria-label="Switch language"
          data-i18n-aria="aria.langToggle"
          data-i18n-title="aria.langToggle"
          title="Switch language"
        >
          <span class="lang-toggle__opt" data-lang-opt="en">EN</span>
          <span class="lang-toggle__opt" data-lang-opt="zh">中</span>
        </button>
        <a
          href="https://gitcode.com/badhope/AI-SKILL"
          rel="noopener noreferrer"
          target="_blank"
          data-i18n="nav.gh"
          data-i18n-aria="aria.gh"
          >GitCode</a
        >
      </nav>
    </header>
    <main id="main" class="main" tabindex="-1" aria-label="Main content">
      <noscript>
        <div class="container-wide">
          <p class="empty">
            <span data-i18n="noscript.line1"
              >This page is a small JavaScript app — without JS you only get this notice.</span
            >
            <span data-i18n="noscript.line2">Enable JavaScript, or</span>
            <a href="https://github.com/MS33834/AI-SKILL" data-i18n="noscript.link">browse the source on GitHub</a>
            <span data-i18n="noscript.line3">for plain SKILL.md files.</span>
          </p>
        </div>
      </noscript>
    </main>
    <footer class="footer">
      <div class="footer__row footer__row--top">
        <span class="footer__brand">
          <span class="footer__mark" aria-hidden="true">▮</span>
          AI-SKILL
        </span>
        <span data-i18n="footer.tagline">MIT · open-source skill index · no tracking · static site</span>
      </div>
      <div class="footer__row footer__row--links">
        <a
          href="https://gitcode.com/badhope/AI-SKILL"
          rel="noopener noreferrer"
          target="_blank"
          data-i18n="footer.source"
          >Source on GitCode</a
        >
        <span class="sep">·</span>
        <a
          href="https://gitcode.com/badhope/AI-SKILL/blob/main/SOURCE.md"
          rel="noopener noreferrer"
          target="_blank"
          data-i18n="footer.sources"
          >SOURCE.md</a
        >
        <span class="sep">·</span>
        <a
          href="https://gitcode.com/badhope/AI-SKILL/blob/main/CONTRIBUTING.md"
          rel="noopener noreferrer"
          target="_blank"
          data-i18n="footer.contrib"
          >Contributing</a
        >
        <span class="sep">·</span>
        <a
          href="https://gitcode.com/badhope/AI-SKILL/blob/main/CHANGELOG.md"
          rel="noopener noreferrer"
          target="_blank"
          data-i18n="footer.changelog"
          >Changelog</a
        >
      </div>
    </footer>
  </body>
</html>
