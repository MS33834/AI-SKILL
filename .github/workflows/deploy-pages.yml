name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      # upload-pages-artifact respects .gitignore by default; the generated
      # frontend/public/skills.json and skills/ entries are gitignored,
      # so they would be silently omitted from the Pages deployment.
      # Copy dist/ to a temp directory outside the repo before uploading.
      - name: Stage deployment bundle
        run: |
          cp -r frontend/dist /tmp/_site
          ls -la /tmp/_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
