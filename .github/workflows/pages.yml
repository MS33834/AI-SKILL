name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Restrict permissions: the workflow only needs to upload
# the built site as a Pages artefact. No write access to
# the repo, no write access to packages.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't run a second redundant build if the workflow is
# triggered by a Dependabot PR. We only care about main.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python deps for validate-skill
        run: |
          python -m pip install --quiet ruamel.yaml pyyaml

      - name: Validate all skills (writes public/skills.json)
        run: python scripts/validate-skill.py

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install JS deps
        working-directory: frontend
        run: npm ci

      - name: Build static site
        working-directory: frontend
        run: npm run build

      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
