name: Check dead links

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: check-links
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Run link check
        run: python scripts/check-links.py --fail

      - name: Commit health.json
        if: always()
        run: |
          git add data/health.json
          if ! git diff --cached --quiet data/health.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "ci(check-links): refresh data/health.json"
            git push
          fi
