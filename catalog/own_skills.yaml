# Our own skills — empty for now.
#
# Schema (same fields as catalog/skills.yaml, plus one extra `path`):
#   slug, title, title_zh, source, source_url, category, subgroup,
#   tags, summary, summary_zh, stars, license, added, archived
#   path          relative path from repo root, e.g.
#                 "skills/url-summarizer.md"
#
# `source` is a sentinel like "this-repo/AI-SKILL" to keep the
# shape consistent with catalog/skills.yaml. It is not used by
# sync-github — that script only fetches external GitHub repos.
#
# Workflow:
#   1. Copy skills/_TEMPLATE.md to skills/<your-slug>.md
#      (fill in frontmatter, write the prompt body).
#   2. Append a record below. Slug must match the filename.
#   3. Open a PR. CI validates the file exists at `path` and
#      that the frontmatter parses.
#
# To delete a skill: remove the row here, then remove the .md.
# Keep the two in sync — no orphan rows, no orphan files.

skills: []
